# railway.toml — Appetina IMS Realtime Server
[build]
builder = "NIXPACKS"

[deploy]
startCommand         = "node server.js"
healthcheckPath      = "/health"
healthcheckTimeout   = 30
restartPolicyType    = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[services]]
name = "appetina-realtime"

[services.env]
NODE_ENV       = "production"
PORT           = "3001"

# Set these in Railway Dashboard → Variables:
# JWT_SECRET          = (generate a strong random string)
# CORS_ORIGIN         = https://resitch-source.github.io
# INTERNAL_API_KEY    = (used by GAS to push events to WS server)
